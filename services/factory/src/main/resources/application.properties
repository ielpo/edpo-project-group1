# Spring Boot Configuration
spring.application.name=factory
spring.datasource.url=jdbc:h2:file:./operaton-h2-database-factory
server.port=8090

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=factory-service-correlation
spring.kafka.consumer.auto-offset-reset=earliest

# Operaton Configuration
operaton.bpm.admin-user.id=demo
operaton.bpm.admin-user.password=demo
operaton.bpm.generic-properties.properties.historyTimeToLive=P1D

# MQTT Configuration
mqtt.broker-uri=tcp://192.168.0.20:1883
mqtt.client-id=factory-service
mqtt.topic=Tinkerforge_Conveyor_distance_IR_short_2a7C

# Inventory Service
edpo.inventory.url=http://localhost:8000

# Color Sensor Service
edpo.sensor.color.url=http://192.168.0.120:80

# Robot Service
edpo.robot.left.url=http://192.168.0.43:5000
edpo.robot.right.url=http://192.168.0.43:5001

edpo.robot.flows.to-holding-position=to-holding-position.yml
edpo.robot.flows.to-inventory=to-inventory.yaml
edpo.robot.flows.to-color-sensor=to-color-sensor.yaml
edpo.robot.flows.to-distance-sensor=to-distance-sensor.yaml
edpo.robot.flows.to-assembly=to-assembly.yaml

# Inventory coordinates
edpo.robot.inventory.x-step = 27
edpo.robot.inventory.y-step = 27
edpo.robot.inventory.z-pickup = -20
