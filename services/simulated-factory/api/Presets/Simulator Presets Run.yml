info:
  name: Simulator Presets Run
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:{{port}}/api/presets/run
  body:
    type: json
    data: |-
      {
        "preset": "happy-path",
        "speed": "normal"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
