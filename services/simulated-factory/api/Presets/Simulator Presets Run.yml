  url: http://localhost:{{port}}/api/presets/run
  body:
    type: json
    data: |-
      {
        "preset": "happy-path"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
