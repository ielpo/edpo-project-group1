defaults:
  sensors:
    color-left:
      type: color
      mode: fixed
      value: RED
      raw_color: [1, 0, 0]
    ir-left:
      type: ir
      mode: fixed
      value: true
    distance-conveyor:
      type: distance
      mode: scripted
      value: 30.0
      scripted_values: [30.0, 12.5, 6.2, 30.0]
      mqtt_topic: sensors/distance/Conveyor/distance_IR_short_left
      uid: TFu
      location: Conveyor
      message_type: distance_IR_short_left
      cadence_ms: 250

presets:
  happy-path:
    description: Deterministic successful order flow with matching color and IR detection.
    steps:
      - name: order-received
        delayMs: 75
        note: Order accepted and conveyor is idle.
        publishDistance: 30.0
      - name: pickup
        delayMs: 10000
        note: Item reaches the pick-up area.
        publishDistance: 12.5
        awaitRequest:
          method: POST
          path: /api/dobot/{name}/commands
      - name: color-check
        delayMs: 10000
        note: Color sensor reports the configured block color.
        awaitRequest:
          method: GET
          path: /api/dobot/{name}/color
      - name: place
        delayMs: 10000
        note: Robot places the item and conveyor clears again.
        publishDistance: 30.0
        awaitRequest:
          method: POST
          path: /api/dobot/{name}/commands

  wrong-color:
    description: The flow continues, but the color sensor deterministically returns blue.
    sensor_overrides:
      color-left:
        value: BLUE
        raw_color: [0, 0, 1]
    steps:
      - name: order-received
        delayMs: 75
        note: Order accepted and conveyor is idle.
        publishDistance: 30.0
      - name: pickup
        delayMs: 10000
        note: Item reaches the pick-up area.
        publishDistance: 11.8
        awaitRequest:
          method: POST
          path: /api/dobot/{name}/commands
      - name: color-check
        delayMs: 10000
        note: Sensor reports the wrong color to trigger a deterministic failure.
        awaitRequest:
          method: GET
          path: /api/dobot/{name}/color
      - name: reject
        delayMs: 10000
        note: Conveyor clears the item after the mismatch.
        publishDistance: 30.0
        awaitRequest:
          method: POST
          path: /api/dobot/{name}/commands

  pickup-failure:
    description: The IR sensor never detects an item, reproducing a failed pickup.
    sensor_overrides:
      ir-left:
        value: false
      distance-conveyor:
        scripted_values: [30.0, 30.0, 30.0, 30.0]
    steps:
      - name: order-received
        delayMs: 75
        note: Order accepted and system waits for pickup.
        publishDistance: 30.0
      - name: pickup-timeout
        delayMs: 10000
        note: No item reaches the IR sensor, so pickup fails.
        publishDistance: 30.0
        awaitRequest:
          method: POST
          path: /api/dobot/{name}/commands
      - name: abort
        delayMs: 10000
        note: Simulation ends in a deterministic failure state.
        publishDistance: 30.0
        awaitRequest:
          method: POST
          path: /api/dobot/{name}/commands