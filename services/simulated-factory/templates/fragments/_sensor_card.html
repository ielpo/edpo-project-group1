<article class="item-card" id="sensor-card-{{ sensor.sensorId }}">
  <header>
    <h3>{{ sensor.sensorId }}</h3>
    <span class="chip chip-assist">{{ sensor.mode }}</span>
  </header>
  <p>Current value: <code>{{ sensor.value|tojson }}</code></p>
  <form
    class="sensor-form"
    hx-put="/api/config/sensors/{{ sensor.sensorId }}"
    hx-target="#sensor-card-{{ sensor.sensorId }}"
    hx-swap="outerHTML"
    hx-ext="json-enc"
  >
    <div class="field">
      <label>Mode</label>
      <input name="mode" value="{{ sensor.mode or 'fixed' }}">
    </div>
    <div class="field">
      <label>Value</label>
      <input name="value" value="{{ sensor.value if sensor.value is not none else '' }}">
    </div>
    <div class="field">
      <label>Raw color (csv)</label>
      <input name="raw_color" value="{{ sensor.raw_color|join(',') if sensor.raw_color else '' }}" placeholder="1,0,0">
    </div>
    <div class="submit-cell">
      <button type="submit" class="btn btn-filled">Apply</button>
    </div>
  </form>
</article>
