<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factory Inventory</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    h1 { margin-bottom: 32px; font-size: 1.6rem; letter-spacing: 1px; }

    #grid {
      display: grid;
      grid-template-columns: 80px repeat(5, 64px);
      gap: 10px;
      margin-bottom: 36px;
    }

    .label {
      display: flex;
      align-items: center;
      font-weight: bold;
      text-transform: capitalize;
      font-size: 0.95rem;
    }

    .cell {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.15);
      transition: background 0.3s, opacity 0.3s;
    }

    .cell.available { opacity: 1; }
    .cell.taken     { background: #2a2a3e !important; opacity: 0.35; }

    /* Row colors */
    .row-red    .cell.available { background: #e74c3c; }
    .row-yellow .cell.available { background: #f1c40f; }
    .row-blue   .cell.available { background: #3498db; }
    .row-green  .cell.available { background: #2ecc71; }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 380px;
    }

    .take-form, .restore-form {
      background: #16213e;
      border-radius: 10px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .take-form h2, .restore-form h2 {
      font-size: 1rem;
      margin-bottom: 4px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .row-inputs {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    select, input[type="number"] {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #0f3460;
      color: #eee;
      font-size: 0.95rem;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }

    .btn-take    { background: #e74c3c; color: #fff; }
    .btn-restore { background: #2ecc71; color: #1a1a2e; width: 100%; }

    .restore-color-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #message {
      margin-top: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      max-width: 380px;
      width: 100%;
      display: none;
    }
    #message.success { background: #1e4d2b; border: 1px solid #2ecc71; color: #2ecc71; }
    #message.error   { background: #4d1e1e; border: 1px solid #e74c3c; color: #e74c3c; }
  </style>
</head>
<body>

<h1>Factory Inventory</h1>

<div id="grid"></div>

<div class="controls">
  <div class="take-form">
    <h2>Take Cubes</h2>
    <div class="row-inputs">
      <select id="take-color">
        <option value="red">Red</option>
        <option value="yellow">Yellow</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
      </select>
      <input type="number" id="take-count" value="1" min="1" max="5" />
      <button class="btn-take" onclick="takeCubes()">Take</button>
    </div>
  </div>

  <div class="restore-form">
    <h2>Restore Cubes</h2>
    <div class="restore-color-row">
      <select id="restore-color">
        <option value="">All colors</option>
        <option value="red">Red</option>
        <option value="yellow">Yellow</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
      </select>
      <button class="btn-restore" onclick="restore()">Restore</button>
    </div>
  </div>
</div>

<div id="message"></div>

<script>
  const COLORS = ["red", "yellow", "blue", "green"];

  async function loadInventory() {
    const res = await fetch("/inventory");
    const data = await res.json();
    renderGrid(data);
  }

  function renderGrid(data) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    for (const color of COLORS) {
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = color;
      grid.appendChild(label);

      const slots = data[color].slots;
      const rowDiv = document.createElement("div");
      rowDiv.style.display = "contents";
      rowDiv.className = `row-${color}`;

      for (let i = 0; i < 4; i++) {
        const cell = document.createElement("div");
        cell.className = `cell ${slots[i] ? "available" : "taken"}`;
        grid.appendChild(cell);
      }

      // re-add label + cells correctly (grid has contents display)
      // We already appended label; now append cells directly to grid with row class wrapper
    }

    // Re-render properly with row wrappers for color scoping
    grid.innerHTML = "";
    for (const color of COLORS) {
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = color;
      grid.appendChild(label);

      const slots = data[color].slots;
      for (let i = 0; i < 5; i++) {
        const cell = document.createElement("div");
        cell.className = `cell ${slots[i] ? "available" : "taken"} cell-${color}`;
        cell.style.background = slots[i] ? colorHex(color) : "";
        grid.appendChild(cell);
      }
    }
  }

  function colorHex(color) {
    return { red: "#e74c3c", yellow: "#f1c40f", blue: "#3498db", green: "#2ecc71" }[color];
  }

  async function takeCubes() {
    const color = document.getElementById("take-color").value;
    const count = parseInt(document.getElementById("take-count").value);
    try {
      const res = await fetch("/take", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ color, count }),
      });
      const data = await res.json();
      if (!res.ok) {
        showMessage(data.detail, "error");
      } else {
        showMessage(data.message, "success");
        renderGrid(data.inventory);
      }
    } catch (e) {
      showMessage("Request failed", "error");
    }
  }

  async function restore() {
    const color = document.getElementById("restore-color").value || null;
    try {
      const res = await fetch("/restore", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ color }),
      });
      const data = await res.json();
      if (!res.ok) {
        showMessage(data.detail, "error");
      } else {
        showMessage(data.message, "success");
        renderGrid(data.inventory);
      }
    } catch (e) {
      showMessage("Request failed", "error");
    }
  }

  function showMessage(text, type) {
    const el = document.getElementById("message");
    el.textContent = text;
    el.className = type;
    el.style.display = "block";
    clearTimeout(el._timer);
    el._timer = setTimeout(() => { el.style.display = "none"; }, 4000);
  }

  loadInventory();
</script>
</body>
</html>
